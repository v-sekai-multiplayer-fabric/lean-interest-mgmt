name: lake build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: lake-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Setup: install toolchain, fetch the Mathlib cache (transitive via
      # lean-spatial-oracle -> truth_research_zk), resolve+clone the dependency
      # graph, and run the production gate by building the cluster lib.
      - name: setup toolchain + cache + production gate (InterestManagement)
        uses: leanprover/lean-action@v1
        with:
          build-args: "InterestManagement"
          test: false
          lint: false
          use-mathlib-cache: true

      # Research-tier proofs: built for signal, NOT gating.
      - name: lake build Research (non-gating)
        continue-on-error: true
        run: lake build Research
